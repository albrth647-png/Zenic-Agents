# ─── Zenic-Agents v3 — Pre-commit Hooks ────────────────────────────
# Phase 6.2: Pre-commit hooks del Plan Maestro de Corrección
#
# Instalación:
#   pip install pre-commit
#   pre-commit install
#
# Ejecutar manualmente:
#   pre-commit run --all-files

default_language_version:
  python: python3.12

repos:
  # ── 1. Ruff — Python linting + formatting ────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        name: Ruff lint (Python)
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]

      - id: ruff-format
        name: Ruff format (Python)
        types_or: [python, pyi]

  # ── 2. detect-secrets — Secret detection ─────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        args: [--baseline, .secrets.baseline]
        exclude: package-lock\.json|bun\.lock|Cargo\.lock

  # ── 3. ESLint — Gateway TypeScript/React linting ─────────────
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.16.0
    hooks:
      - id: eslint
        name: ESLint (Gateway)
        args: [--max-warnings=50]
        additional_dependencies:
          - eslint@9
          - eslint-config-next@15
          - "@typescript-eslint/eslint-plugin@8"
          - "@typescript-eslint/parser@8"
        files: ^gateway/src/.*\.[jt]sx?$
        types: [file]

  # ── 4. Trailing whitespace + general checks ──────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
        exclude: \.md$

      - id: end-of-file-fixer
        name: Fix end of files

      - id: check-yaml
        name: Check YAML syntax
        exclude: gateway/

      - id: check-toml
        name: Check TOML syntax

      - id: check-merge-conflict
        name: Check merge conflicts

      - id: check-added-large-files
        name: Check large files
        args: [--maxkb=500]

      - id: no-commit-to-branch
        name: Protect main branch
        args: [--branch, main]

  # ── 5. TypeScript type check (tsc) ───────────────────────────
  # Note: tsc runs as a local hook since it needs the gateway's
  # node_modules and tsconfig.json
  - repo: local
    hooks:
      - id: tsc-typecheck
        name: TypeScript type check (tsc)
        entry: bash -c 'cd gateway && npx tsc --noEmit'
        language: system
        types_or: [ts, tsx]
        files: ^gateway/src/
        pass_filenames: false
